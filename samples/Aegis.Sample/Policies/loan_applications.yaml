resource: loan_applications
name: loan-application-policy

imports:
  - lending-common

derivedRoles:
  # ReBAC, not ABAC: `committeeMember` isn't a condition over attributes,
  # it's entity-hierarchy membership (Cedar's `in` operator) -- true for
  # anyone reachable from the audit committee's Group entity through the
  # Relationships/*.yaml data, directly or via nested groups.
  committeeMember:
    in:
      type: Group
      id: "'audit-committee'"

actions:
  view:
    allow:
      roles:
        - LoanOfficer

  approve:
    allow:
      # Branch-scoped ABAC, a lending-limit check, and segregation of duties
      # (an officer can never approve their own application) -- the
      # variables come from lending-common.yaml via `imports:` above.
      when: ${sameBranch} && ${withinLimit} && !${isApplicant}

  flag_conflict_of_interest:
    allow:
      # `applicant` is a derived role (see lending-common.yaml), not a
      # static one -- it's computed per-request, but usable anywhere a
      # static role name appears in a `roles:` list.
      roles:
        - applicant

  review:
    allow:
      roles:
        - committeeMember
