name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Fast, deterministic, no external dependencies -- this is the required
  # status check. Integration tests (real Docker/SQL Server via
  # Testcontainers) run as a separate job below, deliberately not required,
  # so a Docker/image-pull hiccup in CI can't block every merge.
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - run: dotnet restore
      - run: dotnet format --verify-no-changes --no-restore
      - run: dotnet build --no-restore
      - run: dotnet test tests/Aegis.Tests/Aegis.Tests.csproj --no-build --collect:"XPlat Code Coverage" --results-directory ./coverage

      - uses: codecov/codecov-action@v7
        with:
          directory: ./coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - run: dotnet test tests/Aegis.IntegrationTests/Aegis.IntegrationTests.csproj
