name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)publish, e.g. v0.2.1. Leave empty for the latest GitHub release. For retrying a partial nuget.org push (--skip-duplicate makes this safe to rerun) without cutting a new version."
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Maintains a "Release PR" that accumulates Conventional Commits since
      # the last release; merging it (a normal PR merge, same branch
      # protection as everything else) is what actually cuts the release --
      # tags the commit, creates the GitHub Release, and bumps the version.
      # Only that merge produces release_created=true, which is what gates
      # the publish job below.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for NuGet Trusted Publishing (OIDC)
      contents: write # required to attach .nupkg files to the release
    steps:
      - name: Determine release tag
        id: tag
        run: |
          if [ -n "$DISPATCH_TAG" ]; then
            echo "tag_name=$DISPATCH_TAG" >> "$GITHUB_OUTPUT"
          elif [ -n "$RELEASE_PLEASE_TAG" ]; then
            echo "tag_name=$RELEASE_PLEASE_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=$(gh release view --json tagName -q .tagName)" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_TAG: ${{ inputs.tag }}
          RELEASE_PLEASE_TAG: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag_name }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Derive package version from tag
        run: echo "PACKAGE_VERSION=${TAG_NAME#v}" >> "$GITHUB_ENV"
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}

      - run: dotnet restore
      - run: dotnet build --no-restore -c Release -p:Version=${{ env.PACKAGE_VERSION }}
      - run: dotnet test --no-build -c Release

      - name: Pack
        run: |
          dotnet pack src/Aegis.Core/Aegis.Core.csproj -c Release --no-build -p:Version=${{ env.PACKAGE_VERSION }} -o ./nupkgs
          dotnet pack src/Aegis.Expressions/Aegis.Expressions.csproj -c Release --no-build -p:Version=${{ env.PACKAGE_VERSION }} -o ./nupkgs
          dotnet pack src/Aegis.Policies/Aegis.Policies.csproj -c Release --no-build -p:Version=${{ env.PACKAGE_VERSION }} -o ./nupkgs
          dotnet pack src/Aegis.Relationships/Aegis.Relationships.csproj -c Release --no-build -p:Version=${{ env.PACKAGE_VERSION }} -o ./nupkgs
          dotnet pack src/Aegis.Evaluator/Aegis.Evaluator.csproj -c Release --no-build -p:Version=${{ env.PACKAGE_VERSION }} -o ./nupkgs
          dotnet pack src/Aegis.Sql/Aegis.Sql.csproj -c Release --no-build -p:Version=${{ env.PACKAGE_VERSION }} -o ./nupkgs
          dotnet pack src/Aegis.AspNetCore/Aegis.AspNetCore.csproj -c Release --no-build -p:Version=${{ env.PACKAGE_VERSION }} -o ./nupkgs
          dotnet pack src/Aegis.AuthZen/Aegis.AuthZen.csproj -c Release --no-build -p:Version=${{ env.PACKAGE_VERSION }} -o ./nupkgs
          dotnet pack src/Aegis.Cli/Aegis.Cli.csproj -c Release --no-build -p:Version=${{ env.PACKAGE_VERSION }} -o ./nupkgs
          dotnet pack src/Aegis.Testing/Aegis.Testing.csproj -c Release --no-build -p:Version=${{ env.PACKAGE_VERSION }} -o ./nupkgs

      # Exchanges this workflow run's GitHub OIDC token for a NuGet.org
      # short-lived (~1hr) API key. Requires a Trusted Publishing policy
      # configured on nuget.org for ehncraft/Aegis + this workflow file
      # (release.yml) -- there's no long-lived NUGET_API_KEY secret to
      # store or leak. See https://learn.microsoft.com/nuget/nuget-org/trusted-publishing
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: dotnet nuget push "./nupkgs/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}

      - name: Attach packages to the GitHub release
        run: gh release upload "$TAG_NAME" ./nupkgs/*.nupkg --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
